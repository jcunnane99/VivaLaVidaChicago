<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Coming Soon</title>
  <meta name="description" content="Our new site is coming soon." />

  <style>
    :root { color-scheme: light dark; }
    body {
      margin: 0;
      font-family: system-ui, -apple-system, Segoe UI, Roboto, Helvetica, Arial, sans-serif;
      min-height: 100vh;
      display: grid;
      place-items: center;
      background: radial-gradient(1200px 600px at 20% 10%, rgba(0,0,0,.08), transparent),
                  radial-gradient(1000px 500px at 80% 90%, rgba(0,0,0,.10), transparent);
    }
    .card {
      width: min(720px, calc(100% - 48px));
      padding: 40px;
      border-radius: 18px;
      background: rgba(255,255,255,.75);
      border: 1px solid rgba(0,0,0,.08);
      backdrop-filter: blur(8px);
      box-shadow: 0 12px 30px rgba(0,0,0,.08);
    }
    @media (prefers-color-scheme: dark) {
      .card {
        background: rgba(20,20,20,.55);
        border: 1px solid rgba(255,255,255,.10);
        box-shadow: 0 12px 30px rgba(0,0,0,.35);
      }
    }
    h1 { margin: 0 0 10px; font-size: 40px; letter-spacing: -0.02em; }
    p  { margin: 0 0 20px; font-size: 18px; line-height: 1.5; opacity: .9; }
    .small { font-size: 14px; opacity: .75; margin-top: 22px; }
    .row { display: flex; gap: 10px; flex-wrap: wrap; margin-top: 16px; }
    input[type="email"] {
      flex: 1;
      min-width: 220px;
      padding: 12px 14px;
      border-radius: 12px;
      border: 1px solid rgba(0,0,0,.15);
      background: transparent;
      font-size: 16px;
      outline: none;
    }
    button {
      padding: 12px 16px;
      border-radius: 12px;
      border: 0;
      cursor: pointer;
      font-size: 16px;
      font-weight: 600;
    }
    button:hover { opacity: .92; }
  </style>
</head>

<body>
  <main class="card">
    <h1>Coming soon.</h1>
    <p>We’re building something new. Check back shortly.</p>

    <!-- Optional email capture UI (no backend). Remove if you don't want it. -->
    <form class="row" onsubmit="event.preventDefault(); alert('Thanks! (This demo does not save emails yet.)');">
      <input type="email" placeholder="Email for updates (optional)" aria-label="Email address" />
      <button type="submit">Notify me</button>
    </form>

    <p class="small">© <span id="year"></span> Your Project Name</p>
  </main>

  <script>
    document.getElementById("year").textContent = new Date().getFullYear();
  </script>
</body>
</html>
